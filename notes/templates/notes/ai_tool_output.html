
{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>
<body>

<div class="container">

    <h1>{{ title }}</h1>

    <div class="card fade-in" style="
        background:#1a1a1a;
        padding:25px;
        border-radius:12px;
        box-shadow:0 0 18px rgba(255,42,163,0.5);
        margin-bottom:30px;
        font-size:18px;
        color:#eee;
        line-height:1.7;">
        
        <pre style="white-space:pre-wrap; color:#eee; background:none; border:none;">
{{ result }}
        </pre>

    </div>

    <!-- Navigation buttons -->
    <div style="text-align:center; margin-top: 25px;">
        <a href="{% url 'notes:upload' %}" class="btn">Upload Another PDF</a>
        <a href="{% url 'notes:home' %}" class="btn" style="margin-left:10px;">Home</a>
    </div>

</div>

</body>
</html>
