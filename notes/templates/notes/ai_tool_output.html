
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>
<body>

<div class="container">

    <h1>{{ title }}</h1>

    <div class="card fade-in">
        <pre style="white-space: pre-wrap; color: var(--text-primary); background: none; border: none; font-size: 16px; line-height: 1.7;">{{ result }}</pre>
    </div>

    <!-- Navigation buttons -->
    <div class="nav-links">
        <a href="javascript:history.back()" class="btn">Back</a>
        <a href="{% url 'notes:upload' %}" class="btn">Upload Another PDF</a>
        <a href="{% url 'notes:home' %}" class="btn btn-secondary">Home</a>
    </div>

</div>

</body>
</html>
