{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
    <style>
        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 30px;
        }

        .quiz-question-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .quiz-question {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            background-color: var(--bg-input);
            color: var(--text-primary);
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .quiz-option:hover {
            background-color: var(--bg-card);
            border-color: var(--primary-light);
        }

        .quiz-option.correct {
            background-color: var(--success);
            border-color: #059669;
            color: white;
        }

        .quiz-option.wrong {
            background-color: var(--error);
            border-color: #dc2626;
            color: white;
        }
        
        .quiz-option:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📝 Practice Quiz</h1>

        {% if quiz %}
        <div class="quiz-container fade-in">
            {% for q in quiz %}
            <div class="quiz-question-card">
                <div class="quiz-question">{{ forloop.counter }}. {{ q.question }}</div>
                <div class="quiz-options">
                    {% for option in q.options %}
                    <div class="quiz-option"
                        onclick="checkAnswer(this, '{{ q.answer|escapejs }}', '{{ option|escapejs }}')">
                        {{ option }}
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="card fade-in text-center">
            <p style="color: var(--error); font-size: 18px;">Could not generate quiz. Please try again.</p>
        </div>
        {% endif %}

        <!-- Navigation -->
        <div class="nav-links">
            <a href="javascript:history.back()" class="btn">Back</a>
            <a href="{% url 'notes:home' %}" class="btn btn-secondary">Home</a>
        </div>

    </div>

    <script>
        function checkAnswer(element, correctAnswer, selectedOption) {
            // Find other options in the same question and disable them
            let optionsRow = element.parentElement;
            let allOptions = optionsRow.querySelectorAll('.quiz-option');

            let alreadyAnswered = Array.from(allOptions).some(opt => opt.classList.contains('correct') || opt.classList.contains('wrong'));
            if (alreadyAnswered) return; // Prevent changing answer

            // Disable all options after answering
            allOptions.forEach(opt => opt.disabled = true);

            // Clean both strings to minimize mismatch issues
            let cleanedCorrect = correctAnswer.trim();
            let cleanedSelected = selectedOption.trim();

            if (cleanedSelected === cleanedCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                // Highlight the correct one
                allOptions.forEach(opt => {
                    if (opt.innerText.trim() === cleanedCorrect) {
                        opt.classList.add('correct');
                    }
                });
            }
        }
    </script>

</body>

</html>
