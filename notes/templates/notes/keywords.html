{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Keywords</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
    <style>
        .keywords-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }

        .keyword-pill {
            background: linear-gradient(135deg, var(--secondary), var(--accent-start));
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.3);
            transition: all 0.3s ease;
            cursor: default;
        }

        .keyword-pill:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.5);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔑 Extracted Keywords</h1>

        {% if keywords %}
        <div class="keywords-container fade-in">
            {% for keyword in keywords %}
            <span class="keyword-pill">{{ keyword }}</span>
            {% endfor %}
        </div>
        {% else %}
        <div class="card fade-in text-center">
            <p style="color: var(--error); font-size: 18px;">Could not extract keywords. Please try again.</p>
        </div>
        {% endif %}

        <!-- Navigation -->
        <div class="nav-links">
            <a href="javascript:history.back()" class="btn">Back</a>
            <a href="{% url 'notes:home' %}" class="btn btn-secondary">Home</a>
        </div>

    </div>

</body>

</html>
