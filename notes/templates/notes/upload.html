{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload PDF</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>
<body>

    <div class="container">
        <h1>📤 Upload a PDF</h1>

        <form method="post" enctype="multipart/form-data" class="text-center">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_file" style="display: block; margin-bottom: 15px; font-size: 16px; color: var(--text-secondary);">
                    Select your PDF file:
                </label>
                {{ form.file }}
            </div>

            <button type="submit">Upload & Process</button>
        </form>

        <div class="nav-links">
            <a href="{% url 'notes:home' %}" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>

</body>
</html>
