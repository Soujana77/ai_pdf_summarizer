{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summary & Tools</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>

<body>

    <div class="container">

        <!-- AI Summary -->
        <h1>📚 AI Summary</h1>
        <div class="card fade-in">
            <p style="color: var(--text-primary); font-size: 18px; line-height: 1.8;">
                {{ summary }}
            </p>
        </div>

        <!-- AI Tools Section -->
        <h2>🛠️ AI Tools</h2>

        <div class="ai-tools">
            <!-- Learning Tools -->
            <a href="{% url 'notes:flashcards' %}?text={{ text|urlencode }}" class="tool-btn learning">
                🧠 Flashcards
            </a>

            <a href="{% url 'notes:extract_keywords' %}?text={{ text|urlencode }}" class="tool-btn keywords">
                🔑 Keywords
            </a>

            <a href="{% url 'notes:quiz' %}?text={{ text|urlencode }}" class="tool-btn quiz">
                📝 Quiz
            </a>

            <!-- Content Tools -->
            <a href="{% url 'notes:bullets' %}?text={{ text|urlencode }}" class="tool-btn">
                📌 Bullet Notes
            </a>

            <a href="{% url 'notes:explain5' %}?text={{ text|urlencode }}" class="tool-btn">
                🧒 Explain Like I'm 5
            </a>

            <a href="{% url 'notes:simplify' %}?text={{ text|urlencode }}" class="tool-btn">
                ✨ Simplify
            </a>

            <!-- Translation - Single consolidated dropdown -->
            <div class="tool-btn translate" style="cursor: pointer;" onclick="document.getElementById('translateMenu').classList.toggle('show')">
                🌐 Translate ▾
                <div id="translateMenu" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border-radius: 8px; margin-top: 8px; border: 1px solid var(--border-color); z-index: 100;">
                    <a href="{% url 'notes:translate' %}?text={{ text|urlencode }}&lang=Kannada" style="display: block; padding: 12px; color: var(--text-primary);">🇮🇳 Kannada</a>
                    <a href="{% url 'notes:translate' %}?text={{ text|urlencode }}&lang=Hindi" style="display: block; padding: 12px; color: var(--text-primary);">🇮🇳 Hindi</a>
                </div>
            </div>
        </div>

        <!-- Extracted Text -->
        <h2>📄 Extracted Text</h2>
        <pre class="fade-in">{{ text }}</pre>

        <!-- Navigation -->
        <div class="nav-links">
            <a href="{% url 'notes:upload' %}" class="btn">Upload Another PDF</a>
            <a href="{% url 'notes:home' %}" class="btn btn-secondary">Home</a>
        </div>

    </div>

    <script>
        // Close translate dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const translateBtn = document.querySelector('.translate');
            const translateMenu = document.getElementById('translateMenu');
            if (translateBtn && !translateBtn.contains(event.target)) {
                translateMenu.classList.remove('show');
            }
        });
    </script>

</body>

</html>
