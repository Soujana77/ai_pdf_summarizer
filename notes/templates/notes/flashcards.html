{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flashcards</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
    <style>
        .flashcard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .flashcard {
            background-color: transparent;
            width: 300px;
            height: 200px;
            perspective: 1000px;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            font-size: 17px;
            line-height: 1.5;
        }
        .flashcard-front {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--primary-light);
        }
        .flashcard-back {
            background: linear-gradient(135deg, var(--primary), var(--accent-start));
            color: white;
            transform: rotateY(180deg);
        }
        .flashcard:hover .flashcard-inner {
            box-shadow: 0 8px 25px var(--shadow-color);
        }
        .hint-text {
            text-align: center;
            color: var(--text-muted);
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 Study Flashcards</h1>

    {% if flashcards %}
        <div class="flashcard-container">
            {% for card in flashcards %}
                <div class="flashcard fade-in" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <p>{{ card.question }}</p>
                        </div>
                        <div class="flashcard-back">
                            <p>{{ card.answer }}</p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
        <p class="hint-text">💡 Click on a card to flip it!</p>
    {% else %}
        <div class="card fade-in text-center">
            <p style="color: var(--error); font-size: 18px;">Could not generate flashcards. Please try again.</p>
        </div>
    {% endif %}

    <!-- Navigation -->
    <div class="nav-links">
        <a href="javascript:history.back()" class="btn">Back</a>
        <a href="{% url 'notes:home' %}" class="btn btn-secondary">Home</a>
    </div>

</div>

</body>
</html>
