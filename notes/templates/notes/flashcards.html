{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>AI Flashcards</title>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
    <style>
        .flashcard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .flashcard {
            background-color: transparent;
            width: 300px;
            height: 200px;
            perspective: 1000px;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            font-size: 18px;
            line-height: 1.5;
        }
        .flashcard-front {
            background-color: #1a1a1a;
            color: #fff;
            border: 2px solid #ff2aa3;
        }
        .flashcard-back {
            background-color: #ff2aa3;
            color: white;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 Study Flashcards</h1>

    {% if flashcards %}
        <div class="flashcard-container">
            {% for card in flashcards %}
                <div class="flashcard fade-in" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <p>{{ card.question }}</p>
                        </div>
                        <div class="flashcard-back">
                            <p>{{ card.answer }}</p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
        <p style="text-align:center; color:#ccc; margin-top:20px;">Click on a card to flip it!</p>
    {% else %}
        <div class="card fade-in" style="background:#1a1a1a; padding:20px; border-radius:12px; text-align:center;">
            <p style="color:#ff5555; font-size:18px;">Could not generate flashcards. Please try again.</p>
        </div>
    {% endif %}

    <!-- Navigation -->
    <div style="text-align:center; margin-top: 40px;">
        <a href="javascript:history.back()" class="btn">Back to Text</a>
        <a href="{% url 'notes:home' %}" class="btn" style="margin-left:10px;">Home</a>
    </div>

</div>

</body>
</html>
